set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'
set -gq utf8-default on
set -sg escape-time 0
set -g mouse on

set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set-option -g status-position bottom

unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -gq allow-passthrough on
set -g visual-activity off

# Window management
set -g base-index 1
set -g renumber-windows on
set -g set-titles on
setw -g automatic-rename on
set -g automatic-rename-format "#{pane_current_path}"
set -g set-titles-string "#S > #W"

unbind n
unbind p

# Pane management
setw -g pane-base-index 1

unbind %
bind b split-window -h -c "#{pane_current_path}"
unbind '"'
bind v split-window -v -c "#{pane_current_path}"

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

unbind -T root C-:
bind -n C-z resize-pane -Z

set-option -gw xterm-keys on

unbind o
bind -r ] copy-mode
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# Sesh config
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

bind-key "f" display-popup -B -E -w 30% -h 45% \
  "sesh connect \"$(
  sesh list -i | fzf --ansi --no-sort --no-multi --reverse --cycle \
    --border=rounded --border-label=' Sessions ' --border-label-pos=center \
    --info=right --separator='─' \
    --prompt='  '\
    --color='bg:#181825,border:#89b4fa,label:#89b4fa' \
    --color='separator:#89b4fa,gutter:#181825'
)\""

# Plugin management
# tpm plugin manager
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'catppuccin/tmux'

# plugins config
set -g @resurrect-capture-pane-contents 'on' # allow tmux-ressurect to capture pane contents
set -g @continuum-restore 'on' # enable tmux-continuum functionality

# theme config
set -g status-left ""
set -g status-right ""

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"

# run ~/.tmux/plugins/catppuccin/catppuccin.tmux

set -g @catppuccin_window_current_text " #W "
set -g @catppuccin_window_text " #W "
set -g status-right "#{E:@catppuccin_status_session}"

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'

# Move between tmux panes (keep this line at the very bottom of tmux.conf)
unbind C-h
bind -r C-h previous-window
unbind C-l
bind -r C-l next-window
