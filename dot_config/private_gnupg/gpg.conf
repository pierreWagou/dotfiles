# =============================================================================
# GPG Configuration - Managed by chezmoi
# =============================================================================

# -----------------------------------------------------------------------------
# Keyserver
# -----------------------------------------------------------------------------
# keyserver hkps://keys.openpgp.org

# -----------------------------------------------------------------------------
# Algorithm Preferences
# -----------------------------------------------------------------------------
# Digest algorithm for certificates
cert-digest-algo SHA512

# Default algorithms (in order of preference)
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed

# Personal algorithm preferences
personal-cipher-preferences AES256 AES192 AES
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed
personal-digest-preferences SHA512 SHA384 SHA256

# S2K (string-to-key) settings
s2k-cipher-algo AES256
s2k-digest-algo SHA512

# -----------------------------------------------------------------------------
# Display Options
# -----------------------------------------------------------------------------
# Character encoding
charset utf-8

# Show fingerprints
with-fingerprint

# Key ID format
keyid-format 0xlong

# Always show full certificate path
fixed-list-mode

# Show validity for UIDs
list-options show-uid-validity
verify-options show-uid-validity

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------
# Require cross-certification
require-cross-certification

# Don't include version or comments in output
no-emit-version
no-comments

# Don't cache symmetric key passphrases
no-symkey-cache

# Use GPG agent
use-agent
